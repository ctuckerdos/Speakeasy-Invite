<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beneath Broad Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
/* =========================
   ATMOSPHERE (REAL FIX)
========================= */

body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  color: #f4efe6;
  overflow: hidden;
  background: #0b0908;
}

/* warm moving light source */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,180,90,0.20), transparent 55%),
    radial-gradient(circle at 70% 80%, rgba(120,80,40,0.15), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(0,0,0,0.9), #000);
  animation: breathe 12s ease-in-out infinite;
  pointer-events: none;
}

/* grain overlay */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.08;
  pointer-events: none;
}

/* slow ambient motion */
@keyframes breathe {
  0% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.04); filter: brightness(1.1); }
  100% { transform: scale(1); filter: brightness(1); }
}

/* =========================
   LAYOUT
========================= */

.container {
  max-width: 540px;
  margin: auto;
  padding: 70px 20px;
  text-align: center;
  position: relative;
}

/* scenes */
.section {
  opacity: 0;
  transform: translateY(14px);
  transition: all 0.7s ease;
  position: absolute;
  width: 100%;
}

.section.active {
  opacity: 1;
  transform: translateY(0);
  position: relative;
}

/* typography */
h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.glow {
  text-shadow: 0 0 30px rgba(255,190,120,0.12);
}

p {
  opacity: 0.75;
}

/* buttons */
button {
  background: rgba(199,164,106,0.9);
  border: none;
  padding: 12px 16px;
  margin: 8px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.04);
  filter: brightness(1.1);
}

/* runaway */
.chaos {
  position: absolute;
}

/* voice */
#voice {
  margin-top: 14px;
  font-style: italic;
  opacity: 0.65;
}
</style>
</head>

<body>

<div class="container">

  <!-- PAGE 1 -->
  <div id="p1" class="section active">
    <h1 class="glow">You’ve Been Noticed</h1>
    <p>JH Beneath Broad acknowledges your presence.</p>

    <button onclick="go('p2')">Accept</button>
    <button id="noBtn" onmouseover="runAway(this)">No</button>

    <p id="voice"></p>
  </div>

  <!-- PAGE 2 -->
  <div id="p2" class="section">
    <h1>Arrival</h1>

    <button onclick="time('6:30 PM')">6:30 PM</button>
    <button onclick="time('7:00 PM')">7:00 PM</button>
  </div>

  <!-- PAGE 3 -->
  <div id="p3" class="section">
    <h1>Attire</h1>

    <button onclick="outfit('Lounge')">Lounge & Lazy</button>
    <button onclick="outfit('Jeans')">Jeans Bro</button>
    <button onclick="outfit('Date')">Date Night</button>
    <button onclick="outfit('AllOut')">All Out</button>
  </div>

  <!-- PAGE 4 -->
  <div id="p4" class="section">
    <h1>Drink</h1>

    <button onclick="drink('Bubbles')">Bougie Bubbles</button>
    <button onclick="drink('Fruity')">Something Fruity</button>
    <button onclick="drink('Old')">Old Fashioned</button>
    <button onclick="drink('Mix')">Ask the Bartender</button>

    <button id="boringBtn" onmouseover="runAway(this)">Nothing. I'm boring.</button>
  </div>

  <!-- FINAL -->
  <div id="p5" class="section">
    <h1 class="glow">You’re In.</h1>
    <p>Saturday night. Don’t be late. They notice everything here.</p>
    <p id="summary"></p>
  </div>

</div>

<script>
let data = {};

const voiceLines = [
  "Noted.",
  "Mm.",
  "We’ll allow it.",
  "Interesting.",
  "Expected.",
  "You’ll do."
];

function voice(){
  document.getElementById("voice").innerText =
    voiceLines[Math.floor(Math.random()*voiceLines.length)];
}

function go(id){
  setTimeout(() => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    voice();
  }, 450);
}

/* runaway */
function runAway(btn){
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
  voice();
}

/* choices */
function time(t){
  data.time = t;
  voice();
  setTimeout(()=>go('p3'), 500);
}

function outfit(o){
  data.outfit = o;
  voice();
  setTimeout(()=>go('p4'), 500);
}

function drink(d){
  data.drink = d;
  voice();
  setTimeout(()=>finish(), 500);
}

function finish(){
  go('p5');
  setTimeout(() => {
    document.getElementById("summary").innerText =
      `Time: ${data.time}
Outfit: ${data.outfit}
Drink: ${data.drink}`;
  }, 600);
}
</script>

</body>
</html>
