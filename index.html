<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beneath Broad Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: radial-gradient(circle at top, #1a1411, #070606);
  color: #f5f1e8;
  overflow: hidden;
}

/* subtle moving atmosphere */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,185,120,0.05), transparent 60%);
  animation: drift 18s ease-in-out infinite;
  pointer-events: none;
}

@keyframes drift {
  0% { transform: translate(-8%, -8%); }
  50% { transform: translate(-12%, -14%); }
  100% { transform: translate(-8%, -8%); }
}

.container {
  max-width: 540px;
  margin: auto;
  padding: 65px 20px;
  text-align: center;
}

/* smooth scene transitions */
.section {
  opacity: 0;
  transform: translateY(10px) scale(0.98);
  transition: all 0.55s ease;
  position: absolute;
  width: 100%;
  left: 0;
}

.section.active {
  opacity: 1;
  transform: translateY(0) scale(1);
  position: relative;
}

h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
}

.glow {
  text-shadow: 0 0 18px rgba(255, 200, 120, 0.15);
}

p {
  opacity: 0.8;
  transition: 0.3s;
}

button {
  background: #c7a46a;
  border: none;
  padding: 12px 16px;
  margin: 8px;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.04);
}

/* runaway button */
.chaos {
  position: absolute;
}

/* subtle spark */
.spark {
  position: fixed;
  width: 4px;
  height: 4px;
  background: gold;
  border-radius: 50%;
  pointer-events: none;
  animation: fade 0.6s ease-out forwards;
}

@keyframes fade {
  from { opacity: 1; transform: scale(1); }
  to { opacity: 0; transform: scale(3); }
}

#voice {
  margin-top: 12px;
  font-style: italic;
  opacity: 0.65;
}
</style>
</head>

<body>

<div class="container">

  <!-- PAGE 1 -->
  <div id="p1" class="section active">
    <h1 class="glow">You’ve Been Noticed</h1>
    <p>JH Beneath Broad has acknowledged your reservation.</p>

    <button onclick="go('p2')">Accept</button>
    <button id="noBtn" onmouseover="runAway(this)">No</button>

    <button onclick="toggleSound()" id="soundBtn">Turn on Jazz (optional)</button>

    <p id="voice"></p>
  </div>

  <!-- PAGE 2 -->
  <div id="p2" class="section">
    <h1>Arrival</h1>

    <button onclick="pickTime('6:30 PM')">6:30 PM</button>
    <button onclick="pickTime('7:00 PM')">7:00 PM</button>
  </div>

  <!-- PAGE 3 -->
  <div id="p3" class="section">
    <h1>Dress Code</h1>

    <button onclick="pickOutfit('Lounge & Lazy')">Lounge & Lazy</button>
    <button onclick="pickOutfit('Jeans Bro')">Jeans Bro</button>
    <button onclick="pickOutfit('Date Night')">Date Night</button>
    <button onclick="pickOutfit('All Out')">All Out</button>
  </div>

  <!-- PAGE 4 -->
  <div id="p4" class="section">
    <h1>Drink</h1>

    <button onclick="pickDrink('Bubbles')">Bougie Bubbles</button>
    <button onclick="pickDrink('Fruity')">Something Fruity</button>
    <button onclick="pickDrink('Old Fashioned')">Old Fashioned</button>
    <button onclick="pickDrink('Mixologist')">Ask the Bartender</button>

    <button id="boringBtn" onmouseover="runAway(this)">Nothing. I'm boring.</button>
  </div>

  <!-- FINAL -->
  <div id="p5" class="section">
    <h1 class="glow">You’re In.</h1>
    <p>Saturday night. Don’t be late. They notice everything here.</p>

    <p id="summary"></p>
  </div>

</div>

<!-- SOUND -->
<audio id="jazz" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b3b3c5a2.mp3?filename=slow-jazz-ambient-11059.mp3">
</audio>

<script>
let data = {};
let soundOn = false;

const voiceLines = [
  "Noted.",
  "Mm.",
  "We’ll allow it.",
  "Interesting.",
  "Expected.",
  "You’ll do."
];

function voice(text){
  document.getElementById("voice").innerText = text;
}

function go(id){
  setTimeout(() => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    voice(voiceLines[Math.floor(Math.random()*voiceLines.length)]);
  }, 400);
}

/* SOUND */
function toggleSound(){
  const audio = document.getElementById("jazz");

  if(!soundOn){
    audio.volume = 0.25;
    audio.play();
    soundOn = true;
    document.getElementById("soundBtn").innerText = "Jazz is on";
  }
}

/* RUNAWAY BUTTON */
function runAway(btn){
  btn.style.position = "absolute";

  setTimeout(() => {
    btn.style.top = Math.random() * (window.innerHeight - 100) + "px";
    btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  }, 120);

  voice("That’s not how this works.");
}

/* SPARK */
function spark(){
  for(let i=0;i<4;i++){
    let s = document.createElement("div");
    s.className = "spark";
    s.style.left = Math.random()*window.innerWidth + "px";
    s.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),600);
  }
}

/* CHOICES */
function pickTime(t){
  data.time = t;
  voice(t === "6:30 PM" ? "Early. Respectable." : "Late. Confident.");
  setTimeout(()=>go('p3'), 600);
}

function pickOutfit(o){
  data.outfit = o;
  voice("Observed.");
  spark();
  setTimeout(()=>go('p4'), 650);
}

function pickDrink(d){
  data.drink = d;
  voice("Good.");
  spark();
  setTimeout(()=>finish(), 650);
}

function finish(){
  go('p5');
  setTimeout(() => {
    document.getElementById("summary").innerText =
      `Time: ${data.time}
Outfit: ${data.outfit}
Drink: ${data.drink}

Status: Approved.`;
  }, 600);
}
</script>

</body>
</html>
