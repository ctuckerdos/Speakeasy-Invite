<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beneath Broad Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
/* =========================
   NEW OBVIOUS BACKGROUND
   (THIS IS THE “YOU ASKED FOR CHANGE” FIX)
========================= */

body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  color: #f5f1e8;
  overflow: hidden;

  /* 🔥 CLEARLY DIFFERENT: WARM VELVET ROOM */
  background:
    radial-gradient(circle at 20% 30%, #3b1f1a 0%, transparent 45%),
    radial-gradient(circle at 80% 70%, #2a1a3a 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, #0a0a10 0%, #050408 70%);
}

/* MOVING LIGHT = obvious motion */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 40%, rgba(255,180,90,0.25), transparent 45%),
    radial-gradient(circle at 70% 60%, rgba(255,120,80,0.15), transparent 55%);
  animation: glowshift 6s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes glowshift {
  from { transform: translate(-2%, -2%); filter: brightness(1); }
  to { transform: translate(3%, 2%); filter: brightness(1.2); }
}

/* subtle smoke haze */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.10;
  pointer-events: none;
}

/* =========================
   LAYOUT
========================= */

.container {
  max-width: 560px;
  margin: auto;
  padding: 80px 20px;
  text-align: center;
}

/* scenes */
.scene {
  display: none;
}

.scene.active {
  display: block;
}

/* =========================
   TEXT
========================= */

h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.glow {
  text-shadow: 0 0 25px rgba(255, 190, 120, 0.25);
}

p {
  opacity: 0.85;
}

/* =========================
   BUTTONS (REDESIGNED)
========================= */

.button-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 20px;
}

button {
  background: linear-gradient(135deg, #c7a46a, #8c6a3d);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 14px 16px;
  margin: 8px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  min-width: 140px;
  transition: 0.2s;
  color: #1a120b;
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

/* runaway buttons */
.chaos {
  position: absolute;
}

/* reaction text */
#reaction {
  margin-top: 18px;
  font-style: italic;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

  <!-- INTRO -->
  <div id="intro" class="scene active">
    <h1 class="glow">You've Been Noticed</h1>
    <p>The room has acknowledged your arrival.</p>

    <div class="button-grid">
      <button onclick="go('time')">Accept</button>
      <button id="noBtn" onmouseover="runAway(this)">No</button>
    </div>

    <p id="reaction"></p>
  </div>

  <!-- TIME -->
  <div id="time" class="scene">
    <h1>When are you arriving?</h1>
    <div class="button-grid">
      <button onclick="pickTime('6:30 PM')">6:30 PM</button>
      <button onclick="pickTime('7:00 PM')">7:00 PM</button>
    </div>
  </div>

  <!-- OUTFIT -->
  <div id="outfit" class="scene">
    <h1>What are you wearing?</h1>
    <div class="button-grid">
      <button onclick="pickOutfit('Lounge')">Lounge & Lazy</button>
      <button onclick="pickOutfit('Jeans')">Jeans Bro</button>
      <button onclick="pickOutfit('Date')">Date Night</button>
      <button onclick="pickOutfit('All')">All Out</button>
    </div>
  </div>

  <!-- DRINK -->
  <div id="drink" class="scene">
    <h1>What are you drinking?</h1>
    <div class="button-grid">
      <button onclick="pickDrink('Bubbles')">Bougie Bubbles</button>
      <button onclick="pickDrink('Fruity')">Something Fruity</button>
      <button onclick="pickDrink('Old')">Old Fashioned</button>
      <button onclick="pickDrink('Mix')">Ask Bartender</button>

      <button id="boring" onmouseover="runAway(this)">Nothing, I'm boring</button>
    </div>
  </div>

  <!-- FINAL -->
  <div id="final" class="scene">
    <h1 class="glow">You're In.</h1>
    <p>Saturday night. Don’t be late.</p>
    <p id="summary"></p>
  </div>

</div>

<script>
let data = {};

/* reaction */
function react(msg){
  document.getElementById("reaction").innerText = msg || "Noted.";
}

/* scene swap */
function go(id){
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* runaway */
function runAway(btn){
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
  react("That answer is not accepted here.");
}

/* flow */
function pickTime(t){
  data.time = t;
  react("Acknowledged.");
  go('outfit');
}

function pickOutfit(o){
  data.outfit = o;
  react("Noted.");
  go('drink');
}

function pickDrink(d){
  data.drink = d;
  react("Good.");
  finish();
}

function finish(){
  go('final');
  document.getElementById("summary").innerText =
    `Time: ${data.time}
Outfit: ${data.outfit}
Drink: ${data.drink}

Status: You're expected.`;
}
</script>

</body>
</html>
