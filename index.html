<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beneath Broad</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  overflow: hidden;
  color: #f5f1e8;

  /* REAL ROOM BASE */
  background:
    radial-gradient(circle at 20% 30%, #3a1f1a, transparent 50%),
    radial-gradient(circle at 80% 60%, #241a3a, transparent 55%),
    radial-gradient(circle at center, #0a0808, #050404);
}

/* MOVING LIGHT (room alive) */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 40% 40%, rgba(255,180,90,0.25), transparent 45%),
    radial-gradient(circle at 70% 70%, rgba(255,120,80,0.15), transparent 55%);
  animation: drift 8s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes drift {
  from { transform: translate(-2%, -2%); }
  to { transform: translate(3%, 2%); }
}

/* ROOM OBJECTS LAYER */
.object {
  position: absolute;
  opacity: 0.8;
  filter: drop-shadow(0 0 10px rgba(255,180,90,0.15));
  transition: all 0.6s ease;
  user-select: none;
}

/* layout */
#room {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* UI PANEL */
#panel {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
}

button {
  background: linear-gradient(135deg,#c7a46a,#8b6a3d);
  border: none;
  padding: 14px 16px;
  margin: 6px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  min-width: 130px;
}

/* reaction text */
#reaction {
  margin-top: 12px;
  opacity: 0.8;
  font-style: italic;
}
</style>
</head>

<body>

<div id="room">

  <!-- AMBIENT OBJECTS -->
  <div class="object" id="candle" style="top:20%;left:15%;">🕯️</div>
  <div class="object" id="glass" style="top:30%;left:75%;">🥃</div>
  <div class="object" id="door" style="top:60%;left:10%;">🚪</div>
  <div class="object" id="bar" style="top:55%;left:70%;">🍸</div>

  <!-- PANEL -->
  <div id="panel">

    <h1 id="title">You’ve Been Noticed</h1>

    <div id="buttons">
      <button onclick="start()">Enter</button>
      <button onclick="runAway(this)">No</button>
    </div>

    <p id="reaction"></p>

  </div>

</div>

<script>
let state = {
  mood: 0,
  time: null,
  outfit: null,
  drink: null
};

function react(text){
  document.getElementById("reaction").innerText = text;
}

/* ROOM EVOLUTION (THIS IS THE FIX) */
function evolveRoom(){
  state.mood++;

  document.body.style.filter = `brightness(${1 + state.mood * 0.05}) saturate(${1 + state.mood * 0.1})`;

  document.getElementById("candle").style.transform = `scale(${1 + state.mood*0.05}) rotate(${state.mood}deg)`;
  document.getElementById("glass").style.left = (75 + state.mood) + "%";
}

/* RUNAWAY BUTTON */
function runAway(btn){
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
  react("That doesn’t work here.");
  evolveRoom();
}

/* ENTRY */
function start(){
  react("The room acknowledges you.");
  evolveRoom();

  setTimeout(() => {
    document.getElementById("title").innerText = "When are you arriving?";

    document.getElementById("buttons").innerHTML = `
      <button onclick="pickTime('6:30 PM')">6:30 PM</button>
      <button onclick="pickTime('7:00 PM')">7:00 PM</button>
    `;
  }, 800);
}

/* TIME */
function pickTime(t){
  state.time = t;
  react("Noted.");
  evolveRoom();

  setTimeout(() => {
    document.getElementById("title").innerText = "What are you wearing?";

    document.getElementById("buttons").innerHTML = `
      <button onclick="pickOutfit('Lounge')">Lounge</button>
      <button onclick="pickOutfit('Jeans')">Jeans</button>
      <button onclick="pickOutfit('Date')">Date Night</button>
    `;
  }, 800);
}

/* OUTFIT */
function pickOutfit(o){
  state.outfit = o;
  react("Observed.");
  evolveRoom();

  setTimeout(() => {
    document.getElementById("title").innerText = "What are you drinking?";

    document.getElementById("buttons").innerHTML = `
      <button onclick="finish('Bubbles')">Bubbles</button>
      <button onclick="finish('Fruity')">Fruity</button>
      <button onclick="finish('Old')">Old Fashioned</button>
      <button onclick="finish('Mix')">Let Bartender Decide</button>
    `;
  }, 800);
}

/* FINAL */
function finish(d){
  state.drink = d;
  evolveRoom();

  document.getElementById("title").innerText = "You're In.";

  document.getElementById("buttons").innerHTML = "";

  react(
    `Time: ${state.time} | Outfit: ${state.outfit} | Drink: ${state.drink}`
  );
}
</script>

</body>
</html>
