<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: #f5f5f5;
  overflow: hidden;
}

/* ambient smoke layer */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 60%);
  animation: drift 12s infinite linear;
  pointer-events: none;
}

@keyframes drift {
  0% { transform: translate(-10%, -10%); }
  50% { transform: translate(-5%, -20%); }
  100% { transform: translate(-10%, -10%); }
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 60px 20px;
  text-align: center;
  position: relative;
}

h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
}

.glow {
  text-shadow: 0 0 20px rgba(255, 215, 120, 0.25);
}

button {
  background: #b08d57;
  border: none;
  padding: 12px 18px;
  margin: 10px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 4px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

input, select {
  padding: 10px;
  width: 80%;
  margin: 10px;
}

.section { display: none; }
.section.active { display: block; animation: fade 0.6s ease; }

@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* runaway button chaos */
#noBtn {
  position: absolute;
}
</style>
</head>

<body>

<div class="container">

  <!-- INTRO -->
  <div id="intro" class="section active">
    <h1 class="glow">You Were Not Expected</h1>
    <p>A door opens where there was none before...</p>
    <button onclick="next('name')">Enter</button>
  </div>

  <!-- NAME -->
  <div id="name" class="section">
    <h1>Who arrives?</h1>
    <input id="guestName" placeholder="Name..." />
    <br>
    <button onclick="next('time')">Continue</button>
  </div>

  <!-- TIME -->
  <div id="time" class="section">
    <h1>When do you arrive?</h1>
    <select id="timeSelect">
      <option>7:00 PM</option>
      <option>7:30 PM</option>
      <option>8:00 PM</option>
      <option>8:30 PM</option>
    </select>
    <br>
    <button onclick="next('outfit')">Continue</button>
  </div>

  <!-- OUTFIT -->
  <div id="outfit" class="section">
    <h1>Dress code</h1>
    <button onclick="pick('outfit',this)">Black & Gold</button>
    <button onclick="pick('outfit',this)">Elegant Casual</button>
    <button onclick="pick('outfit',this)">Let Fate Decide</button>
    <br>
    <button onclick="next('drink')">Continue</button>
  </div>

  <!-- DRINK -->
  <div id="drink" class="section">
    <h1>Your first drink</h1>
    <button onclick="pick('drink',this)">Old Fashioned</button>
    <button onclick="pick('drink',this)">Something Sweet</button>
    <button onclick="pick('drink',this)">Surprise Me</button>
    <br>
    <button onclick="next('final')">Continue</button>
  </div>

  <!-- FINAL -->
  <div id="final" class="section">
    <h1 class="glow">It is decided.</h1>
    <p>Your presence has been accounted for.</p>
    <button onclick="submitInvite()">Confirm</button>
  </div>

</div>

<script>
let data = {
  outfit: "",
  drink: ""
};

function next(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function pick(type, btn){
  data[type] = btn.innerText;
}

function submitInvite(){
  const payload = {
    name: document.getElementById("guestName").value,
    time: document.getElementById("timeSelect").value,
    outfit: data.outfit,
    drink: data.drink,
    timeStamp: new Date().toISOString()
  };

  document.querySelector('.container').innerHTML = `
    <h1 class="glow">Welcome.</h1>
    <p>Your seat is reserved.</p>
  `;
  console.log(payload);
}
</script>

</body>
</html>
