<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Invited</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: radial-gradient(circle at top, #1b1a18, #0a0a0a);
  color: #f4f1ea;
  overflow: hidden;
}

/* ambient warm haze */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,200,120,0.06), transparent 60%);
  animation: drift 14s infinite linear;
  pointer-events: none;
}

@keyframes drift {
  0% { transform: translate(-10%, -10%); }
  50% { transform: translate(-5%, -15%); }
  100% { transform: translate(-10%, -10%); }
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 50px 20px;
  text-align: center;
}

h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
}

.glow {
  text-shadow: 0 0 18px rgba(255, 215, 130, 0.25);
}

button {
  background: #c2a46a;
  border: none;
  padding: 12px 16px;
  margin: 8px;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.section { display: none; }
.section.active { display: block; animation: fade 0.5s ease; }

@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* runaway chaos buttons */
.chaos {
  position: absolute;
}

/* sparkle effect */
.spark {
  position: fixed;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  pointer-events: none;
  animation: pop 0.6s ease-out forwards;
}

@keyframes pop {
  from { transform: scale(1); opacity: 1; }
  to { transform: scale(3); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

  <!-- PAGE 1 -->
  <div id="p1" class="section active">
    <h1 class="glow">You’ve Been Summoned</h1>
    <p>JH Beneath Broad. Dinner. Drinks. A slightly illegal amount of fun.</p>

    <button onclick="go('p2')">Yes, I'm in 🍸</button>
    <button id="noBtn" onmouseover="runAway(this)">No 😌</button>
  </div>

  <!-- PAGE 2 -->
  <div id="p2" class="section">
    <h1>What time?</h1>

    <button onclick="pickTime('6:30 PM')">6:30 PM</button>
    <button onclick="pickTime('7:00 PM')">7:00 PM</button>

    <p id="timeNote"></p>
  </div>

  <!-- PAGE 3 -->
  <div id="p3" class="section">
    <h1>Dress code</h1>

    <button onclick="pickOutfit('Lounge & Lazy')">🛋 Lounge & Lazy</button>
    <button onclick="pickOutfit('Jeans Bro')">👖 Jeans Bro</button>
    <button onclick="pickOutfit('Date Night')">🖤 Date Night</button>
    <button onclick="pickOutfit('All Out!')">✨ All Out!</button>
  </div>

  <!-- PAGE 4 -->
  <div id="p4" class="section">
    <h1>What are we drinking?</h1>

    <button onclick="pickDrink('Bougie Bubbles')">🥂 Bougie Bubbles</button>
    <button onclick="pickDrink('Fruity Something')">🍍 Fruity Something</button>
    <button onclick="pickDrink('Old Fashioned')">🥃 Old Fashioned</button>
    <button onclick="pickDrink('Mixologist Surprise')">🧪 Mixologist Surprise</button>

    <button id="boringBtn" onmouseover="runAway(this)">🚫 Nothing, I’m boring</button>
  </div>

  <!-- FINAL -->
  <div id="p5" class="section">
    <h1 class="glow">It’s Official.</h1>
    <p>You’re on the list. Don’t be late.</p>
    <p id="summary"></p>
  </div>

</div>

<script>
let data = {};

function go(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function runAway(btn){
  btn.classList.add('chaos');
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
  sparkle();
}

function pickTime(t){
  data.time = t;
  document.getElementById("timeNote").innerText = "Perfect. That one feels right.";
  setTimeout(()=>go('p3'), 700);
}

function pickOutfit(o){
  data.outfit = o;
  sparkle();
  go('p4');
}

function pickDrink(d){
  data.drink = d;
  sparkle();
  finish();
}

function sparkle(){
  for(let i=0;i<6;i++){
    let s = document.createElement("div");
    s.className = "spark";
    s.style.left = Math.random()*window.innerWidth + "px";
    s.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 600);
  }
}

function finish(){
  go('p5');
  document.getElementById("summary").innerText =
    `Time: ${data.time}\nOutfit: ${data.outfit}\nDrink: ${data.drink}`;
}
</script>

</body>
</html>
