<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beneath Broad</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: radial-gradient(circle at top, #1f1a16, #0b0a09);
  color: #f5f1e8;
  overflow: hidden;
}

/* soft amber haze */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,180,90,0.06), transparent 60%);
  animation: drift 16s linear infinite;
  pointer-events: none;
}

@keyframes drift {
  0% { transform: translate(-8%, -8%); }
  50% { transform: translate(-12%, -15%); }
  100% { transform: translate(-8%, -8%); }
}

.container {
  max-width: 540px;
  margin: auto;
  padding: 60px 20px;
  text-align: center;
}

h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
  font-weight: 600;
}

.glow {
  text-shadow: 0 0 18px rgba(255, 200, 120, 0.2);
}

p {
  opacity: 0.85;
}

button {
  background: #c7a46a;
  border: none;
  padding: 12px 16px;
  margin: 8px;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.section { display: none; }
.section.active { display: block; animation: fade 0.5s ease; }

@keyframes fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* runaway button */
.chaos {
  position: absolute;
}

/* subtle shake feedback */
.shake {
  animation: shake 0.25s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  50% { transform: translateX(4px); }
  75% { transform: translateX(-3px); }
  100% { transform: translateX(0); }
}

/* sparkle micro feedback */
.spark {
  position: fixed;
  width: 5px;
  height: 5px;
  background: gold;
  border-radius: 50%;
  pointer-events: none;
  animation: pop 0.6s ease-out forwards;
}

@keyframes pop {
  from { opacity: 1; transform: scale(1); }
  to { opacity: 0; transform: scale(3); }
}

/* bartender text */
#voice {
  margin-top: 10px;
  font-style: italic;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

  <!-- INTRO -->
  <div id="p1" class="section active">
    <h1 class="glow">You’ve Been Noticed</h1>
    <p>JH Beneath Broad has a reservation under your existence.</p>

    <button onclick="go('p2')">Accept</button>
    <button id="noBtn" onmouseover="runAway(this)">No</button>

    <div id="voice"></div>
  </div>

  <!-- TIME -->
  <div id="p2" class="section">
    <h1>When are you arriving?</h1>

    <button onclick="chooseTime('6:30 PM')">6:30 PM</button>
    <button onclick="chooseTime('7:00 PM')">7:00 PM</button>

    <p id="voice2"></p>
  </div>

  <!-- OUTFIT -->
  <div id="p3" class="section">
    <h1>Dress code assessment</h1>

    <button onclick="chooseOutfit('Lounge & Lazy')">Lounge & Lazy</button>
    <button onclick="chooseOutfit('Jeans Bro')">Jeans Bro</button>
    <button onclick="chooseOutfit('Date Night')">Date Night</button>
    <button onclick="chooseOutfit('All Out')">All Out</button>
  </div>

  <!-- DRINK -->
  <div id="p4" class="section">
    <h1>First drink decision</h1>

    <button onclick="chooseDrink('Bubbles')">Bougie Bubbles</button>
    <button onclick="chooseDrink('Fruity')">Something Fruity</button>
    <button onclick="chooseDrink('Old Fashioned')">Old Fashioned</button>
    <button onclick="chooseDrink('Mixologist')">Talk to the bartender</button>

    <button id="boringBtn" onmouseover="runAway(this)">Nothing. I'm boring.</button>
  </div>

  <!-- FINAL -->
  <div id="p5" class="section">
    <h1 class="glow">You're in.</h1>
    <p>Try not to ruin the vibe.</p>

    <p id="summary"></p>
  </div>

</div>

<script>
let data = {};

function go(id){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  voice(randomVoice());
}

function voice(text){
  let v = document.getElementById("voice");
  if(v) v.innerText = text;
}

function randomVoice(){
  const lines = [
    "Noted.",
    "Bold choice.",
    "We’ve seen worse.",
    "Interesting…",
    "Try not to overthink it.",
    "Accepted. Barely."
  ];
  return lines[Math.floor(Math.random()*lines.length)];
}

/* runaway button logic */
function runAway(btn){
  btn.classList.add("chaos");
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
  sparkle();
}

function sparkle(){
  for(let i=0;i<5;i++){
    let s = document.createElement("div");
    s.className = "spark";
    s.style.left = Math.random()*window.innerWidth + "px";
    s.style.top = Math.random()*window.innerHeight + "px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),600);
  }
}

/* choices */
function chooseTime(t){
  data.time = t;
  document.getElementById("voice2").innerText = "Seat reserved. Don’t be late.";
  setTimeout(()=>go('p3'), 700);
}

function chooseOutfit(o){
  data.outfit = o;
  sparkle();
  go('p4');
}

function chooseDrink(d){
  data.drink = d;
  finish();
}

function finish(){
  go('p5');
  document.getElementById("summary").innerText =
    `Time: ${data.time}\nOutfit: ${data.outfit}\nDrink: ${data.drink}`;
}
</script>

</body>
</html>
