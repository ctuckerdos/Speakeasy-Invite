<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beneath Broad</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
/* =========================
   ATMOSPHERE (ROOM FIRST)
========================= */

body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  color: #f5f1e8;
  overflow: hidden;
  background: #070505;
}

/* living light */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,170,90,0.18), transparent 55%),
    radial-gradient(circle at 70% 60%, rgba(120,80,40,0.12), transparent 60%),
    radial-gradient(circle at center, rgba(0,0,0,0.9), #000);
  animation: breathe 14s ease-in-out infinite;
  pointer-events: none;
}

@keyframes breathe {
  0% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.03); filter: brightness(1.08); }
  100% { transform: scale(1); filter: brightness(1); }
}

/* grain */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://grainy-gradients.vercel.app/noise.svg");
  opacity: 0.07;
  pointer-events: none;
}

/* =========================
   STRUCTURE
========================= */

.container {
  max-width: 600px;
  margin: auto;
  padding: 90px 20px;
  text-align: center;
}

/* EVERYTHING is staged */
.scene {
  opacity: 0;
  transform: translateY(18px);
  transition: all 0.9s ease;
  position: absolute;
  width: 100%;
}

.scene.active {
  opacity: 1;
  transform: translateY(0);
  position: relative;
}

/* reveal animation for options */
.hidden {
  opacity: 0;
  transform: translateY(10px);
  transition: 0.6s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

/* typography */
h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 2px;
}

.glow {
  text-shadow: 0 0 30px rgba(255,190,120,0.12);
}

p {
  opacity: 0.75;
}

/* buttons */
button {
  background: rgba(199,164,106,0.85);
  border: none;
  padding: 12px 16px;
  margin: 8px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  transform: scale(1.03);
  filter: brightness(1.15);
}

/* runaway */
.chaos {
  position: absolute;
}

/* reaction */
#reaction {
  margin-top: 18px;
  font-style: italic;
  opacity: 0.65;
  min-height: 20px;
}
</style>
</head>

<body>

<div class="container">

  <!-- INTRO -->
  <div id="intro" class="scene active">
    <h1 class="glow">You’ve Been Noticed</h1>
    <p>The room registers your arrival.</p>

    <div id="introButtons" class="hidden">
      <button onclick="enter()">Enter</button>
      <button id="noBtn" onmouseover="runAway(this)">No</button>
    </div>

    <p id="reaction"></p>
  </div>

  <!-- TIME -->
  <div id="time" class="scene">
    <h1>When are you arriving?</h1>

    <div id="timeOptions" class="hidden">
      <button onclick="pickTime('6:30 PM')">6:30 PM</button>
      <button onclick="pickTime('7:00 PM')">7:00 PM</button>
    </div>
  </div>

  <!-- OUTFIT -->
  <div id="outfit" class="scene">
    <h1>What are you wearing?</h1>

    <div id="outfitOptions" class="hidden">
      <button onclick="pickOutfit('Lounge')">Lounge & Lazy</button>
      <button onclick="pickOutfit('Jeans')">Jeans Bro</button>
      <button onclick="pickOutfit('Date')">Date Night</button>
      <button onclick="pickOutfit('All')">All Out</button>
    </div>
  </div>

  <!-- DRINK -->
  <div id="drink" class="scene">
    <h1>What are you drinking?</h1>

    <div id="drinkOptions" class="hidden">
      <button onclick="pickDrink('Bubbles')">Bougie Bubbles</button>
      <button onclick="pickDrink('Fruity')">Something Fruity</button>
      <button onclick="pickDrink('Old')">Old Fashioned</button>
      <button onclick="pickDrink('Mix')">Ask the Bartender</button>

      <button id="boringBtn" onmouseover="runAway(this)">Nothing, I'm boring</button>
    </div>
  </div>

  <!-- FINAL -->
  <div id="final" class="scene">
    <h1 class="glow">You’re In.</h1>
    <p>They were expecting you.</p>
    <p id="summary"></p>
  </div>

</div>

<script>
let data = {};

/* room reaction */
function react(msg){
  document.getElementById("reaction").innerText = msg || "";
}

/* staged reveal helper */
function reveal(id){
  setTimeout(() => {
    document.getElementById(id).classList.add("show");
  }, 900);
}

/* scene swap with delay */
function go(id){
  setTimeout(() => {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }, 600);
}

/* ENTRY */
function enter(){
  react("The room acknowledges you.");
  setTimeout(()=>go('time'), 900);
  setTimeout(()=>reveal('timeOptions'), 1500);
}

/* RUNAWAY */
function runAway(btn){
  btn.style.position = "absolute";
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
  react("That answer is not accepted here.");
}

/* TIME */
function pickTime(t){
  data.time = t;
  react("Noted.");
  go('outfit');
  reveal('outfitOptions');
}

/* OUTFIT */
function pickOutfit(o){
  data.outfit = o;
  react("Observed.");
  go('drink');
  reveal('drinkOptions');
}

/* DRINK */
function pickDrink(d){
  data.drink = d;
  react("Good.");
  setTimeout(()=>finish(), 800);
}

/* FINAL */
function finish(){
  go('final');
  setTimeout(() => {
    document.getElementById("summary").innerText =
      `Time: ${data.time}
Outfit: ${data.outfit}
Drink: ${data.drink}

Status: Expected.`;
  }, 900);
}
</script>

</body>
</html>
